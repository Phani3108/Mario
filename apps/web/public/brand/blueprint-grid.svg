<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(233,115,0,0.10)" stroke-width="0.6"/>
    </pattern>
    <pattern id="grid-major" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(233,115,0,0.18)" stroke-width="0.9"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#grid)"/>
  <rect width="200" height="200" fill="url(#grid-major)"/>
</svg>
