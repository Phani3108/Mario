<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" preserveAspectRatio="xMidYEnd slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#080D17"/>
    </linearGradient>
  </defs>
  <!-- Distant haze -->
  <rect x="0" y="0" width="1200" height="220" fill="url(#sky)" opacity="0.4"/>

  <!-- Charminar silhouette (left, recognisably Hyderabad) -->
  <g fill="url(#tower)" stroke="rgba(245,192,99,0.18)" stroke-width="0.6">
    <!-- Plinth -->
    <rect x="60" y="130" width="160" height="80"/>
    <!-- Arched gateway -->
    <path d="M120 210 V160 a20 20 0 0 1 40 0 V210 Z" fill="#080D17"/>
    <!-- Four minars -->
    <rect x="62" y="60" width="14" height="150"/>
    <rect x="206" y="60" width="14" height="150"/>
    <rect x="62" y="120" width="14" height="6" fill="rgba(245,192,99,0.45)"/>
    <rect x="206" y="120" width="14" height="6" fill="rgba(245,192,99,0.45)"/>
    <!-- Mid minars (back row) -->
    <rect x="100" y="80" width="10" height="50" opacity="0.6"/>
    <rect x="172" y="80" width="10" height="50" opacity="0.6"/>
    <!-- Domes -->
    <ellipse cx="69" cy="60" rx="14" ry="10"/>
    <ellipse cx="213" cy="60" rx="14" ry="10"/>
    <!-- Central pinnacle -->
    <rect x="135" y="98" width="10" height="32"/>
    <polygon points="135,98 145,98 140,82"/>
  </g>

  <!-- Modern Hitech-style towers (right side) -->
  <g fill="url(#tower)" stroke="rgba(245,192,99,0.10)" stroke-width="0.4">
    <rect x="320" y="80"  width="58" height="130"/>
    <rect x="386" y="50"  width="74" height="160"/>
    <rect x="468" y="100" width="50" height="110"/>
    <rect x="528" y="70"  width="68" height="140"/>
    <rect x="606" y="120" width="44" height="90"/>
    <rect x="660" y="40"  width="86" height="170"/>
    <rect x="754" y="92"  width="52" height="118"/>
    <rect x="816" y="62"  width="78" height="148"/>
    <rect x="902" y="110" width="44" height="100"/>
    <rect x="956" y="78"  width="68" height="132"/>
    <rect x="1034" y="100" width="50" height="110"/>
    <rect x="1094" y="56"  width="80" height="154"/>
  </g>

  <!-- Cabling-light windows, scattered as warm dots -->
  <g fill="#F0A731" opacity="0.65">
    <!-- procedurally placed (hand-tuned) -->
    <rect x="330" y="105" width="3" height="3"/><rect x="338" y="105" width="3" height="3"/><rect x="346" y="105" width="3" height="3"/>
    <rect x="330" y="120" width="3" height="3"/><rect x="346" y="120" width="3" height="3"/>
    <rect x="396" y="80"  width="3" height="3"/><rect x="406" y="80" width="3" height="3"/><rect x="418" y="80" width="3" height="3"/>
    <rect x="396" y="100" width="3" height="3"/><rect x="406" y="100" width="3" height="3"/>
    <rect x="478" y="115" width="3" height="3"/><rect x="490" y="115" width="3" height="3"/>
    <rect x="546" y="95"  width="3" height="3"/><rect x="560" y="95"  width="3" height="3"/><rect x="574" y="95" width="3" height="3"/>
    <rect x="676" y="75"  width="3" height="3"/><rect x="690" y="75" width="3" height="3"/><rect x="704" y="75" width="3" height="3"/><rect x="718" y="75" width="3" height="3"/>
    <rect x="676" y="100" width="3" height="3"/><rect x="704" y="100" width="3" height="3"/>
    <rect x="770" y="110" width="3" height="3"/><rect x="788" y="110" width="3" height="3"/>
    <rect x="836" y="85"  width="3" height="3"/><rect x="852" y="85"  width="3" height="3"/><rect x="868" y="85" width="3" height="3"/>
    <rect x="980" y="100" width="3" height="3"/><rect x="998" y="100" width="3" height="3"/>
    <rect x="1110" y="75" width="3" height="3"/><rect x="1126" y="75" width="3" height="3"/><rect x="1146" y="75" width="3" height="3"/>
  </g>

  <!-- Foreground ground line -->
  <rect x="0" y="208" width="1200" height="12" fill="#080D17"/>
</svg>
