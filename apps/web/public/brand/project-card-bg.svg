<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E97300" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#E97300" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(245,192,99,0.10)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="url(#g)"/>
  <rect width="400" height="240" fill="url(#grid)"/>
  <rect width="400" height="100" fill="url(#warm)"/>

  <!-- Stylised tower silhouettes, off-centre right -->
  <g fill="rgba(8,13,23,0.85)" stroke="rgba(245,192,99,0.16)" stroke-width="0.4">
    <rect x="220" y="80"  width="40" height="160"/>
    <rect x="266" y="60"  width="56" height="180"/>
    <rect x="328" y="100" width="40" height="140"/>
  </g>
  <!-- A few lit windows -->
  <g fill="#F0A731" opacity="0.7">
    <rect x="232" y="100" width="3" height="3"/><rect x="244" y="100" width="3" height="3"/>
    <rect x="232" y="118" width="3" height="3"/><rect x="244" y="118" width="3" height="3"/>
    <rect x="278" y="85"  width="3" height="3"/><rect x="290" y="85" width="3" height="3"/><rect x="302" y="85" width="3" height="3"/>
    <rect x="278" y="110" width="3" height="3"/><rect x="302" y="110" width="3" height="3"/>
    <rect x="340" y="120" width="3" height="3"/><rect x="354" y="120" width="3" height="3"/>
  </g>

  <!-- Plumb-line accent (brand callback) -->
  <g stroke="rgba(245,192,99,0.6)" stroke-width="1" stroke-linecap="round">
    <line x1="60" y1="40" x2="60" y2="190"/>
    <polygon points="60,190 56,196 60,202 64,196" fill="#E97300" stroke="none"/>
  </g>
</svg>
